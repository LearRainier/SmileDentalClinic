<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — NewSmile Dental Clinic</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
<button class="darkmode" onclick="myFunction()">🌙</button>
<header>
  <div class="container nav-container">
    <div class="logo"><a href="index.html"><img src="images/title-logo.png" alt="NewSmile Dental Clinic"></a></div>
    <nav>
      <button class="nav-toggle" aria-label="Toggle nav">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="Login.html">Login</a></li>
      </ul>
    </nav>
  </div>
</header>
<div class="auth-section">
  <div class="auth-visual">
    <div class="auth-visual-content">
      <div class="auth-visual-logo">😁</div>
      <h2>Join the <em>NewSmile</em> family</h2>
      <p>Create an account to manage your appointments and dental health records in one secure place.</p>
    </div>
  </div>
  <div class="auth-form-side">
    <div class="auth-card reveal">
      <h1>Create Account</h1>
      <p class="subtitle">Join us and take control of your dental health</p>
      <form>
        <div class="form-row">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Juan dela Cruz">
        </div>
        <div class="form-row">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="juan@example.com">
        </div>
        <div class="form-row">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="09XX-XXX-XXXX">
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Create a strong password">
        </div>
        <div class="form-row">
          <button class="btn" type="submit">Create Account</button>
        </div>
        <p>Already have an account? <a href="Login.html">Sign in</a></p>
      </form>
    </div>
  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
